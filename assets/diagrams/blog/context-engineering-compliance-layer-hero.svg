<text x="430.0" y="201.0" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#2C2522">Context engineering</text>
<text x="430.0" y="220.0" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B5F58">assemble the whole working set</text>
<text x="430.0" y="237.0" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#3D3929" letter-spacing="0.02em">flexible · richer · pricier</text>
<rect x="588.0" y="176" width="240" height="78" rx="8" fill="#EDE5F0" stroke="#C9B8D9" stroke-width="1.5"/>
<rect x="588.0" y="176" width="4" height="78" rx="2" fill="#C9B8D9"/>
<text x="708.0" y="201.0" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#2C2522">Governed context engineering</text>
<text x="708.0" y="220.0" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B5F58">filter by permission before retrieval</text>
<text x="708.0" y="237.0" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#3D3929" letter-spacing="0.02em">auditable · reproducible</text>
<text x="152" y="276" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10.5" fill="#6B5F58" font-style="italic">sacrifices: recall on long docs</text>
<text x="430" y="276" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10.5" fill="#6B5F58" font-style="italic">sacrifices: cost + latency control</text>
<text x="708" y="276" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10.5" fill="#CC785C" font-style="italic">sacrifices: setup time, not safety</text>
