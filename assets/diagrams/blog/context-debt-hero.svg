<line x1="410" y1="160" x2="605" y2="220" stroke="#3D3929" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="90.0" y="340" width="250" height="64" rx="8" fill="#FAF9F5" stroke="#2C2522" stroke-width="1.5"/>
<text x="215.0" y="366.0" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#2C2522">Obvious error</text>
<text x="215.0" y="385.0" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B5F58">incoherent, easy to spot</text>
<rect x="480.0" y="340" width="250" height="64" rx="8" fill="#F5EBC9" stroke="#E8C547" stroke-width="1.5"/>
<rect x="480.0" y="340" width="4" height="64" rx="2" fill="#E8C547"/>
<text x="605.0" y="366.0" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#2C2522">Coherent, confident, wrong</text>
<text x="605.0" y="385.0" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B5F58">reads like a careful senior wrote it</text>
