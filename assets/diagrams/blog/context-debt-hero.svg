<text x="410.0" y="124.0" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#2C2522">Incomplete or stale context</text>
<text x="410.0" y="143.0" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B5F58">wrong docs · missing tool output · drifted memory</text>
