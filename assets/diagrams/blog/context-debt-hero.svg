<text x="605" y="432" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12.5" fill="#CC785C">ships to production</text>
<text x="410.0" y="474" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#6B5F58" font-style="italic">same bad context — the smarter the model, the later you find out</text>
