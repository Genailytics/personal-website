<text x="605.0" y="244.0" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#2C2522">Frontier model</text>
<text x="605.0" y="263.0" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B5F58">the upgrade you reached for</text>
